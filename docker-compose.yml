version: "2"

networks:
  frontend:
    driver: bridge
  backend:
    driver: bridge

services:
  nginx:
    image: nginx:alpine
    volumes:
      - ./www/:/var/www/html/:rw
      - ./conf/nginx/conf.d/:/etc/nginx/conf.d/:rw
      - ./conf/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./log/nginx/:/var/log/nginx/:rw
    restart: always
    privileged: true
    container_name: nginx
    environment:
      TZ: "Asia/Shanghai"
    ports:
      - "80:80"
      - "443:443"
    links:
      - php:php
    networks:
      - frontend
      - backend

  php:
    build: ./build/php
    volumes:
      - ./www/:/var/www/html/:rw
      - ./conf/php/php.ini:/usr/local/etc/php/php.ini:ro
      - ./conf/php/php-fpm.conf:/usr/local/etc/php-fpm.d/www.conf:rw
      - ./log/php/:/var/log/php-fpm/:rw
    restart: always
    container_name: php
    expose:
      - "9000"
    links:
      - mysql:mysql
    networks:
      - backend

  mysql:
    image: mysql:5.7
    volumes:
      - ./conf/mysql/my.cnf:/etc/mysql/my.cnf:ro
      - ./data/mysql/:/var/lib/mysql/:rw
      - ./log/mysql/:/var/log/mysql/:rw
    restart: always
    privileged: true
    container_name: mysql
    environment:
      MYSQL_ROOT_PASSWORD: 'root'
      TZ: "Asia/Shanghai"
    ports:
      - "3306:3306"
    networks:
      - backend
